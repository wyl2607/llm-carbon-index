# Annual-average grid carbon intensity — FALLBACK when Electricity Maps live
# data is unavailable or a region is unsupported (Hard Constraint #8).
# Values are gCO2eq/kWh, location-based (physical grid). Every value cites a
# source (Hard Constraint #2). See docs/methodology.md §4.1.
#
# STATUS: seed for Phase 3. Reviewed against the (uncited) Gemini draft and
# corrected — notably EU was changed from a France-like 82 to the Ember EU-27
# average of ~242. Market-based (PPA-adjusted) factors are NOT seeded here;
# they are per-provider, low-confidence, and added in Phase 3 with sources.

units: gCO2eq_per_kWh
basis: location_based
as_of: "2023 annual averages"

regions:
  US:
    carbon_intensity: 369
    source: "Ember, United States electricity 2023 annual (cf. EPA eGRID2022 ~375)"
  CN:
    carbon_intensity: 537
    source: "Ember, China electricity 2023 annual"
  EU:                       # EU-27 aggregate, NOT a single low-carbon country
    carbon_intensity: 242
    source: "Ember, EU-27 electricity 2023 annual"
  FR:                       # illustrative very-low-carbon region (nuclear+hydro)
    carbon_intensity: 56
    source: "Ember, France electricity 2023 annual"
