# Direct-combustion CO₂ emission factors (gCO₂/kWh) for EIA hourly fuel-type data weighting.
# Applied only to us-east (PJM respondent) when EIA_API_KEY is present.
# These are operational (stack/output) factors, kept consistent with the existing
# us-east annual fallback (EPA eGRID2022 output emission rate, 380 g/kWh).
# Nuclear, hydro, wind, solar, and "other" treated as 0 g direct.
#
# Every value has a matching entry in data/provenance/sources.yaml (C-GRID-EIA-*).
# Sources chosen for operational (not full LCA) to match project convention for grid intensity.

- fuel: "COL"
  gco2_per_kwh: 961
  note: "Coal (bituminous/subbituminous average); IPCC AR5 median direct combustion for electricity"
  source_id: "C-GRID-EIA-COL-961"

- fuel: "NG"
  gco2_per_kwh: 483
  note: "Natural gas combined cycle / turbine average; IPCC AR5 direct for gas generation"
  source_id: "C-GRID-EIA-NG-483"

- fuel: "OIL"
  gco2_per_kwh: 650
  note: "Petroleum liquids / distillate (conservative mid for residual/distillate mix)"
  source_id: "C-GRID-EIA-OIL-650"

- fuel: "NUC"
  gco2_per_kwh: 0
  note: "Nuclear — direct combustion 0"
  source_id: "C-GRID-EIA-ZERO"

- fuel: "WAT"
  gco2_per_kwh: 0
  note: "Hydro — direct 0"
  source_id: "C-GRID-EIA-ZERO"

- fuel: "SUN"
  gco2_per_kwh: 0
  note: "Solar — direct 0"
  source_id: "C-GRID-EIA-ZERO"

- fuel: "WND"
  gco2_per_kwh: 0
  note: "Wind — direct 0"
  source_id: "C-GRID-EIA-ZERO"

- fuel: "OTH"
  gco2_per_kwh: 0
  note: "Other (biomass, geothermal direct component small/treated 0 for operational grid mix)"
  source_id: "C-GRID-EIA-ZERO"
