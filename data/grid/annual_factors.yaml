# Annual-average grid carbon intensity fallback (gCO2eq/kWh).
# Used when Electricity Maps live query fails or is unavailable (no key, unknown
# zone, rate limit, network error). See DATA_SCHEMAS.md §5.
#
# region keys are the canonical identifiers used in crosswalk assumed_region.
# Every number here has a corresponding entry in docs/ASSUMPTIONS.md (C-GRID-*).
#
# electricitymaps_zone: the Electricity Maps zone code used for the LIVE query
# (region keys above are NOT valid EM zones). Representative data-center zone per
# region; absent => no live query for that region (annual factor used). Zone codes
# from app.electricitymaps.com zone list. See ASSUMPTIONS.md#C-GRID-EM-ZONES.

- region: "us-east"
  gco2_per_kwh: 380
  year: 2022
  electricitymaps_zone: "US-MIDA-PJM"  # PJM Interconnection (Mid-Atlantic/eastern US DC hub)
  source: "EPA eGRID2022 (U.S. average output emission rate); see ASSUMPTIONS.md#C-GRID-US-EAST-380 and C-GRID-EGRID"
  source_id: "C-GRID-EGRID"

- region: "europe-west"
  gco2_per_kwh: 230
  year: 2024
  electricitymaps_zone: "IE"  # Ireland — dominant western-EU cloud region (AWS/Azure/GCP eu-west)
  source: "Ember 2024 Europe West annual factor; see ASSUMPTIONS.md#C-GRID-EUROPE-WEST-230"
  source_id: "C-GRID-EUROPE-WEST-230"

# China regional grids — official MEE+NBS 2022 factors (公告2024年第33号, 0.xxxx kgCO2/kWh).
# Region keys map providers to their *actual* serving grid (see crosswalk). North
# China (华北, incl. Beijing / Inner Mongolia-West / Zhangbei DC hubs) is the
# dirtiest; East China (华东, Shanghai) lower. cn-national is the all-China average
# used only when a provider's serving region is unknown. See ASSUMPTIONS.md#C-GRID-MEE-2022.
- region: "cn-north"  # 华北 — Beijing / Inner Mongolia (DeepSeek, Kimi, Zhipu, Qwen, Xiaomi)
  gco2_per_kwh: 678
  year: 2022
  source: "MEE+NBS 2022 North China regional factor 0.6776 kgCO2/kWh; see ASSUMPTIONS.md#C-GRID-MEE-2022"
  source_id: "C-GRID-MEE-2022"

- region: "cn-east"  # 华东 — Shanghai (MiniMax, StepFun)
  gco2_per_kwh: 562
  year: 2022
  source: "MEE+NBS 2022 East China regional factor 0.5617 kgCO2/kWh; see ASSUMPTIONS.md#C-GRID-MEE-2022"
  source_id: "C-GRID-MEE-2022"

- region: "cn-central"  # 华中
  gco2_per_kwh: 540
  year: 2022
  source: "MEE+NBS 2022 Central China regional factor 0.5395 kgCO2/kWh; see ASSUMPTIONS.md#C-GRID-MEE-2022"
  source_id: "C-GRID-MEE-2022"

- region: "cn-northeast"  # 东北
  gco2_per_kwh: 556
  year: 2022
  source: "MEE+NBS 2022 Northeast China regional factor 0.5564 kgCO2/kWh; see ASSUMPTIONS.md#C-GRID-MEE-2022"
  source_id: "C-GRID-MEE-2022"

- region: "cn-northwest"  # 西北
  gco2_per_kwh: 586
  year: 2022
  source: "MEE+NBS 2022 Northwest China regional factor 0.5857 kgCO2/kWh; see ASSUMPTIONS.md#C-GRID-MEE-2022"
  source_id: "C-GRID-MEE-2022"

- region: "cn-south"  # 南方 — Guangdong / Hainan (DeepSeek subsea DC)
  gco2_per_kwh: 387
  year: 2022
  source: "MEE+NBS 2022 South China regional factor 0.3869 kgCO2/kWh; see ASSUMPTIONS.md#C-GRID-MEE-2022"
  source_id: "C-GRID-MEE-2022"

- region: "cn-southwest"  # 西南 — hydro-rich, lowest
  gco2_per_kwh: 227
  year: 2022
  source: "MEE+NBS 2022 Southwest China regional factor 0.2268 kgCO2/kWh; see ASSUMPTIONS.md#C-GRID-MEE-2022"
  source_id: "C-GRID-MEE-2022"

- region: "cn-national"  # 全国平均 — used when serving region unknown
  gco2_per_kwh: 537
  year: 2022
  electricitymaps_zone: "CN"  # China aggregate zone (only national maps to EM "CN")
  source: "MEE+NBS 2022 national average factor 0.5366 kgCO2/kWh; see ASSUMPTIONS.md#C-GRID-MEE-2022"
  source_id: "C-GRID-MEE-2022"

- region: "eu-27"
  gco2_per_kwh: 242
  year: 2023
  source: "Ember 2023 EU-27 annual; see ASSUMPTIONS.md#C-GRID-EU-27-242"
  source_id: "C-GRID-EU-27-242"

- region: "default"
  gco2_per_kwh: 400
  year: 2023
  source: "Conservative composite fallback (round order-of-magnitude of US/EU/CN mix informed by Ember global 2023 approx); used only when region key missing from this table. See ASSUMPTIONS.md#C-GRID-DEFAULT"
  source_id: "C-GRID-DEFAULT-400"
