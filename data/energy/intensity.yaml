# Wh per output token (primary inference energy driver).
# Specific models (ai_energy_score or ecologits sourced) + parameter class bands
# for fallback / unknown. See DATA_SCHEMAS.md §3.
#
# All numeric values are recorded with derivation in docs/ASSUMPTIONS.md (E-series).
# No model-specific numbers are allowed in pipeline/*.py.

models:
  - openrouter_slug: "minimax/minimax-m2.5"
    energy_source: "ai_energy_score"
    wh_per_output_token: { low: 0.0008, mid: 0.0015, high: 0.003 }
    source: "AI Energy Score v2 (HF/Salesforce/CMU); cross-checked against EcoLogits ranges for similar active-param scale. See ASSUMPTIONS.md#E-MINIMAX-M2.5"
    source_id: "E-MINIMAX-M2.5"

  - openrouter_slug: "meta-llama/llama-3.1-8b-instruct"
    energy_source: "ai_energy_score"
    wh_per_output_token: { low: 0.0004, mid: 0.0009, high: 0.0018 }
    source: "AI Energy Score v2 for 7-13B class; range widened for tokenizer variance and benchmark-to-production diff. See ASSUMPTIONS.md#E-LLAMA-31-8B"
    source_id: "E-LLAMA-31-8B"

  - openrouter_slug: "qwen/qwen2.5-72b-instruct"
    energy_source: "ai_energy_score"
    wh_per_output_token: { low: 0.0018, mid: 0.0040, high: 0.0090 }
    source: "AI Energy Score v2 informed for 70B dense class (higher than 8B). Range conservative per E-METHOD. See ASSUMPTIONS.md#E-QWEN25-72B"
    source_id: "E-QWEN25-72B"

  - openrouter_slug: "mistralai/mistral-7b-instruct-v0.3"
    energy_source: "ai_energy_score"
    wh_per_output_token: { low: 0.0005, mid: 0.0013, high: 0.0026 }
    source: "AI Energy Score v2 small-model band; EU origin model. See ASSUMPTIONS.md#E-MISTRAL-7B"
    source_id: "E-MISTRAL-7B"

  - openrouter_slug: "deepseek/deepseek-chat"
    energy_source: "ai_energy_score"
    wh_per_output_token: { low: 0.0015, mid: 0.0035, high: 0.0080 }
    idle_kwh_per_day: { low: 3000, mid: 8500, high: 18000 }
    # Attributable fraction of the always-on deployment slice charged to this
    # model's visible traffic. Calibrated so the implied all-in Wh/query band
    # contains BLOOM's ~3.96 Wh/query all-in figure (arXiv:2211.02001); see the
    # idle regression in tests/test_energy.py and ASSUMPTIONS.md#E-IDLE.
    idle_share_of_day: 0.2
    idle_source_id: "E-IDLE"
    source: "AI Energy Score v2 informed for ~67B MoE-equivalent dense class. See ASSUMPTIONS.md#E-DEEPSEEK-67B. Idle term (E-IDLE) added for comparable-large always-on attribution per BLOOM gap (arXiv:2211.02001)."
    source_id: "E-DEEPSEEK-67B"

  - openrouter_slug: "anthropic/claude-3.5-sonnet-20241022"
    energy_source: "ecologits"
    wh_per_output_token: { low: 0.0025, mid: 0.0060, high: 0.0150 }
    source: "EcoLogits (LCA ISO 14044) estimate for frontier closed model; range substantially widened for undisclosed param/hardware uncertainty. See ASSUMPTIONS.md#E-CLAUDE-35-SONNET"
    source_id: "E-CLAUDE-35-SONNET"

  # Phase 6j: top-traffic open models (by total_tokens on 2026-06-14) upgraded to measured where defensible AI Energy Score class data exists.
  # Only families with prior seed entries get measured promotion; no new numbers fabricated. xiaomi etc left fallback.
  - openrouter_slug: "minimax/minimax-m3"
    energy_source: "ai_energy_score"
    wh_per_output_token: { low: 0.0008, mid: 0.0015, high: 0.003 }
    source: "AI Energy Score v2 class for ~10B-active MoE (MiniMax M2.5 seed); applied to M3 successor by family continuity. See ASSUMPTIONS.md#E-MINIMAX-M3 and E-METHOD."
    source_id: "E-MINIMAX-M3"

  - openrouter_slug: "deepseek/deepseek-v4-flash"
    energy_source: "ai_energy_score"
    wh_per_output_token: { low: 0.0015, mid: 0.0035, high: 0.0080 }
    source: "AI Energy Score v2 60-70B class (DeepSeek seed); applied to V4 Flash by family. See ASSUMPTIONS.md#E-DEEPSEEK-V4-FLASH and E-METHOD."
    source_id: "E-DEEPSEEK-V4-FLASH"

  - openrouter_slug: "deepseek/deepseek-v4-pro"
    energy_source: "ai_energy_score"
    wh_per_output_token: { low: 0.0015, mid: 0.0035, high: 0.0080 }
    source: "AI Energy Score v2 60-70B class (DeepSeek seed); applied to V4 Pro by family. See ASSUMPTIONS.md#E-DEEPSEEK-V4-PRO and E-METHOD."
    source_id: "E-DEEPSEEK-V4-PRO"

parameter_class_fallback:
  # Used when energy_source=parameter_class_fallback in crosswalk OR slug unknown to crosswalk.
  # Bands keyed by max_active_params_b. Pick largest for unknowns (conservative).
  - max_active_params_b: 15
    wh_per_output_token: { low: 0.0005, mid: 0.0012, high: 0.0025 }
    source: "ASSUMPTIONS.md#E-CLASS-SMALL (informed by AI Energy Score v2 + EcoLogits small-model measurements; widened for variance)"
    source_id: "E-CLASS-SMALL"

  - max_active_params_b: 100
    wh_per_output_token: { low: 0.002, mid: 0.005, high: 0.012 }
    source: "ASSUMPTIONS.md#E-CLASS-LARGE (informed by AI Energy Score / EcoLogits 30-100B class; upper bound accounts for closed-model opacity)"
    source_id: "E-CLASS-LARGE"
