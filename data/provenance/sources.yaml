# Provenance registry (Phase 6G) — the single source of truth for every number.
#
# Every numeric record in data/**/*.yaml carries a `source_id` that must resolve to
# one `id` here. The build gate (pipeline/provenance.py unsourced_numbers) FAILS if any
# number lacks a resolvable source_id. IDs reuse the existing docs/ASSUMPTIONS.md scheme
# (A* / E* / C* / DC* / V* / L*) where one exists.
#
# COPYRIGHT: `claim` is a SHORT PARAPHRASE + a locator — never a verbatim quote from the
# source (respect source licensing). Keep claims terse; the gate caps their length.
#
# Schema (DATA_SCHEMAS.md §6):
#   id · title · publisher · url · version · accessed · locator · license · claim

