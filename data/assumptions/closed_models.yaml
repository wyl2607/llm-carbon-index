# Assumptions for closed (opaque) providers: region, PUE, hardware context.
# Used to override default PUE=1.2 and to record CLOSED_MODEL_ASSUMED flag.
# Source citations point to ASSUMPTIONS.md (DC-series). See DATA_SCHEMAS.md §4.
# Regions must resolve in grid (annual_factors or live EM zones).

- provider: "openai"
  models: ["openai/gpt-4o"]
  assumed_cloud: "azure"
  assumed_region: "us-east"
  assumed_gpu: "H100"
  pue: 1.16
  source: "ASSUMPTIONS.md#DC-OPENAI (Azure US region; PUE 1.16 from Microsoft 2024 global average disclosure)"
  source_id: "DC-OPENAI"

- provider: "anthropic"
  models: ["anthropic/claude-3.5-sonnet-20241022"]
  assumed_cloud: "aws"
  assumed_region: "us-east"
  assumed_gpu: "H100"
  pue: 1.15
  source: "ASSUMPTIONS.md#DC-ANTHROPIC (Anthropic AWS US-East; PUE 1.15 from Amazon 2023 sustainability report)"
  source_id: "DC-ANTHROPIC"

- provider: "google"
  models: ["google/gemini-1.5-flash"]
  assumed_cloud: "google"
  assumed_region: "us-east"
  assumed_gpu: "H100"
  pue: 1.10
  source: "ASSUMPTIONS.md#DC-GOOGLE (Google Cloud US regions; Google 2024 fleet PUE 1.09, floored to band low 1.10 per A4 best-in-class)"
  source_id: "DC-GOOGLE"

