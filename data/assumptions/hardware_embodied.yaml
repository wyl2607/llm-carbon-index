# Hardware embodied carbon parameters for physical (LLMCarbon-style) estimator.
# All numeric values have associated source_id (H-* namespace) resolvable in
# data/provenance/sources.yaml. Values use {low,mid,high} Ranges; points use {mid: x}.
# Die areas in mm²; CPA in kgCO2eq per cm² (convert mm2/100 inside estimator).
# Follows LLMCarbon arXiv:2309.14393 CPA×area amortisation (eq 11-12) + vendor specs.
# On load failure in pipeline/embodied.py: SKIP to {} and continue (never abort pipeline).

gpu_classes:
  - id: A100-80GB
    die_area_mm2:
      mid: 826
      source_id: H-DIE-A100
    cpa_kgco2_per_cm2:
      low: 0.8
      mid: 1.0
      high: 1.5
      source_id: H-CPA-LLMCarbon
    tdp_kw:
      mid: 0.4
      source_id: H-TDP-A100
    lifetime_hours:
      low: 26280
      mid: 43800
      high: 61320
      source_id: H-LIFETIME-3TO7YR
    utilization:
      low: 0.3
      mid: 0.5
      high: 0.7
      source_id: H-UTIL-INFERENCE
    source_id: H-A100

  - id: H100-SXM
    die_area_mm2:
      mid: 814
      source_id: H-DIE-H100
    cpa_kgco2_per_cm2:
      low: 1.6
      mid: 1.8
      high: 2.1
      source_id: H-CPA-LLMCarbon
    tdp_kw:
      mid: 0.7
      source_id: H-TDP-H100
    lifetime_hours:
      low: 26280
      mid: 43800
      high: 61320
      source_id: H-LIFETIME-3TO7YR
    utilization:
      low: 0.3
      mid: 0.5
      high: 0.7
      source_id: H-UTIL-INFERENCE
    source_id: H-H100
