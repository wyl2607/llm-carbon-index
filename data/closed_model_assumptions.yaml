# Assumptions for CLOSED models whose params/hardware/DC are undisclosed
# (Hard Constraint #6). These carry the widest uncertainty ranges and lowest
# confidence — every assumption MUST cite its reasoning/source (#2), and ranges
# are mandatory (#5).
#
# STATUS: SCHEMA STUB. Seeded in Phase 2.
#
# Per-model schema:
#   estimated_params_b: {min, max}   # billions; with reasoning
#   energy_source: ecologits | fallback
#   assumed_hardware: {value, source}
#   open_or_closed: closed
#   origin_country: ISO country
#   provider_id: key into provider_region_map.yaml
#   confidence: low                  # closed models are inherently low-confidence
#   sources: [ ... ]

models: {}

