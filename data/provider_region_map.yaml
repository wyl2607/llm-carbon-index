# Provider -> likely data-center region(s) + confidence (Hard Constraint #4: no
# silent assumptions — every guess carries a confidence and a note).
# Region codes key into data/grid_fallback_factors.yaml.
#
# STATUS: seed for Phase 3. DC locations are often undisclosed; these are
# best-effort assumptions, not facts. Closed providers carry low confidence.

providers:
  openai:
    name: OpenAI
    likely_regions: [US]
    confidence: medium
    note: "Served primarily on Microsoft Azure US regions; exact DC undisclosed."
  anthropic:
    name: Anthropic
    likely_regions: [US]
    confidence: medium
    note: "AWS/GCP US regions; exact DC undisclosed."
  google:
    name: Google
    likely_regions: [US]
    confidence: low
    note: "Global Google Cloud footprint; serving region for inference undisclosed."
  deepseek:
    name: DeepSeek
    likely_regions: [CN]
    confidence: medium
    note: "China-based; no public PPA/green procurement data."
  meta-llama:
    name: Meta (Llama)
    likely_regions: [US]
    confidence: low
    note: "Open weights served by many hosts; region depends on the actual host."
  mistralai:
    name: Mistral AI
    likely_regions: [EU]
    confidence: low
    note: "EU-based company; serving region varies by host/provider."
