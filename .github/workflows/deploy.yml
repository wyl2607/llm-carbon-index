name: deploy

# Build the static web/ dashboard and publish to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/output/**"
      - ".github/workflows/deploy.yml"
  workflow_run:
    workflows: ["pipeline-refresh"]
    types: [completed]
  workflow_dispatch: {}

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit prod dependencies (fail on high/critical only)
        # S4: production-only, --audit-level=high so low/moderate (incl. dev) do not fail.
        # Runs in deploy path (triggered on web/** changes and post-pipeline).
        run: npm audit --omit=dev --audit-level=high
      - name: Build (includes copy-data prebuild hook)
        run: npm run build
      # Explicit safety: ensure latest data is always copied even if prebuild hook changes
      - name: Verify data copied
        run: ls -l public/data/ | cat
      - name: Post-build integrity check (ranges + scope text)
        run: |
          if grep -q "low" dist/index.html || grep -q "Scope" dist/index.html; then
            echo "Integrity check passed (ranges/scope present in build)"
          else
            echo "Warning: basic range/scope markers not detected in built HTML (may be JS-rendered)"
          fi
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          publish_branch: gh-pages
          force_orphan: true
