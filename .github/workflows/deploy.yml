name: deploy

# Build the static web/ dashboard and publish to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "data/output/**"
      - ".github/workflows/deploy.yml"
  workflow_run:
    workflows: ["pipeline-refresh"]
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist

