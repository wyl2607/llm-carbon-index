name: pipeline-refresh

# Daily data refresh: run the pipeline and commit fresh output JSON if changed.
on:
  schedule:
    - cron: "30 6 * * *"   # 06:30 UTC daily, after the OpenRouter day rolls over
  workflow_dispatch: {}

# Don't let two refresh runs overlap (they'd race on data/output/**).
concurrency:
  group: pipeline-refresh
  cancel-in-progress: false

permissions:
  contents: write          # to commit refreshed data/output/**

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ELECTRICITYMAPS_API_KEY: ${{ secrets.ELECTRICITYMAPS_API_KEY }}
        run: uv run python -m pipeline.run --date latest

      - name: Commit refreshed output (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/output)" ]; then
            git add data/output
            git commit -m "chore(data): refresh output $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No output changes; nothing to commit."
          fi
