name: pipeline-refresh

# Daily data refresh: run the pipeline and commit fresh output JSON if changed.
on:
  schedule:
    - cron: "30 6 * * *"   # 06:30 UTC daily, after the OpenRouter day rolls over
  workflow_dispatch: {}

# Don't let two refresh runs overlap (they'd race on data/output/**).
concurrency:
  group: pipeline-refresh
  cancel-in-progress: false

# S5: least-privilege — only the refresh job needs write scopes.
# contents:write is required solely for the atomic commit+push of data/output + snapshots
# (gating from B1/B2 ensures only verified data reaches this path).
# issues:write added for L1 cron-failure alerting below.
# pull-requests:write added for S5 (create dated branch + PR; never direct push to main).
permissions: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Run pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ELECTRICITYMAPS_API_KEY: ${{ secrets.ELECTRICITYMAPS_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: uv run python -m pipeline.run --date latest

      # B2: gate the auto-refresh before it can reach the public site. Any failure
      # here fails the job (no commit, no push) instead of publishing bad data.
      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest -q

      - name: Provenance gate (every gated number must resolve to a source)
        run: uv run python -m pipeline.provenance

      - name: Reproducibility gate (replay every golden from its frozen snapshot)
        run: uv run python -m pipeline.verify

      - name: Create dated branch + commit + open PR (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # B1: commit the frozen input snapshot in the SAME commit as the output it
          # produced. Otherwise every auto-refreshed golden is an unverifiable orphan
          # (no snapshot → `make verify` can never replay it).
          if [ -n "$(git status --porcelain data/output data/raw/snapshots)" ]; then
            BRANCH="data-refresh/$(date -u +%Y-%m-%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git add data/output data/raw/snapshots
            git commit -m "chore(data): refresh output + snapshot $(date -u +%Y-%m-%d)"
            git push origin "$BRANCH"
            BODY=$(printf '%s\n' \
              "Automated daily data refresh (LLM Carbon Index)." \
              "" \
              "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              "**Base commit:** ${{ github.sha }}" \
              "**Generated (UTC):** $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              "" \
              "This PR was created by the pipeline-refresh workflow after all gates passed." \
              "A human must review and merge. Do not enable auto-merge.")
            gh pr create \
              --title "chore(data): daily data refresh $(date -u +%Y-%m-%d)" \
              --body "$BODY" \
              --base main \
              --head "$BRANCH" || true
          else
            echo "No data changes; nothing to commit."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # L1: cron-failure visibility. Runs only on job failure (gates or commit/push).
      # Opens a new issue or comments on an existing open one with same title.
      # Makes silent daily cron deaths actionable instead of invisible.
      - name: Report failure (open or update issue)
        if: failure()
        run: |
          TITLE="pipeline-refresh: daily data refresh failed"
          BODY=$(printf '%s\n' \
            "**Failed run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "**Commit:** ${{ github.sha }}" \
            "**Time (UTC):** $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "" \
            "This issue was auto-created/updated by the pipeline-refresh workflow to surface cron failures (L1)." \
            "Previous failures may be linked below." \
            "" \
            "See logs for root cause (e.g. API rate limit, schema change, gate failure).")
          # Find most recent open issue matching title (simple dedup)
          EXISTING=$(gh issue list --state open --limit 5 --json title,number --jq '.[] | select(.title == "'"$TITLE"'") | .number' | head -1 || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY" || true
          else
            # No --label: custom labels may not exist in the repo, and `gh issue create`
            # fails outright on an unknown label, which (with `|| true`) would silently
            # create NO issue and defeat L1. Title-based dedup above is sufficient.
            gh issue create --title "$TITLE" --body "$BODY" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
