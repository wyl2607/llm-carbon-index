name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Lint (ruff, incl. secret/security checks)
        run: uv run ruff check .

      - name: Provenance gate (no unsourced number in data/**/*.yaml)
        run: uv run python -m pipeline.provenance

      - name: Run tests
        # No OPENROUTER_API_KEY in CI for this job: the Phase-0 prover and tests
        # exercise the offline illustrative-sample path. Real keys come from
        # repository secrets only in the Phase-5 data-refresh workflow.
        run: uv run pytest -q
