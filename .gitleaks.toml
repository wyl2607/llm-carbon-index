title = "gitleaks config - llm-carbon-index"

[allowlist]
description = "Model metadata join keys (capability_key + slug values) are table keys for efficiency frontier / rightsizing (Phase 6M / 0.8.0), not credentials. Values in data/crosswalk/model_crosswalk.yaml and data/model_capability.yaml (provisional placeholders per docs). See PR #22 and CHANGELOG 0.8.0. Real secrets never committed here."
regexes = [
  '''(?i)capability_key''',
]
paths = [
  '''(?i)(^|/)data/''',
  '''(?i)(^|/)docs/''',
  '''(?i)(^|/)CHANGELOG''',
]
